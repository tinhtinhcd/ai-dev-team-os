# Local development containers for AI Dev Team OS
# Usage: docker compose up -d
# The app runs on the host; use this for optional services (e.g. future DB, Redis).

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev
    profiles:
      - full

